<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guidely</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─────────────────────────────────────────────────────────
       Andes X Design Tokens
       Source: 01 Main library [Andes X] — ax-color + ax-font
    ───────────────────────────────────────────────────────── */
    :root {
      /* Primitive — ax-color/gray */
      --ax-gray-100: #f4f5f9;
      --ax-gray-200: #e7e9f3;
      --ax-gray-300: #d0d4e6;
      --ax-gray-400: #b5b9d4;
      --ax-gray-500: #9c9ebf;
      --ax-gray-600: #8788ab;
      --ax-gray-700: #646587;
      --ax-gray-800: #434565;
      --ax-gray-900: #282833;

      /* Primitive — ax-color/dark-gray */
      --ax-dark-100: #040407;
      --ax-dark-200: #0d0d1b;
      --ax-dark-300: #191a2e;
      --ax-dark-400: #282a43;
      --ax-dark-500: #3f415f;
      --ax-dark-600: #656686;
      --ax-dark-700: #9292b0;
      --ax-dark-800: #b7b5cf;
      --ax-dark-900: #d8d6e5;

      /* Primitive — ax-color/blue (Andes X primary) */
      --ax-blue-100: #e9f1ff;
      --ax-blue-200: #dee9ff;
      --ax-blue-300: #c6d8ff;
      --ax-blue-500: #7a95ff;
      --ax-blue-600: #5c70fa;
      --ax-blue-700: #434be4;
      --ax-blue-800: #353ac5;

      /* Primitive — ax-color/green */
      --ax-green-100: #defade;
      --ax-green-500: #28bf2d;
      --ax-green-600: #14a919;
      --ax-green-700: #1f8923;

      /* Mercado Pago legacy brand green */
      --mp-green: #00a650;
      --mp-green-bg: #e6f7ee;
      --mp-green-dark: #006633;

      /* Primitive — ax-color/red */
      --ax-red-100: #ffe5e9;
      --ax-red-600: #ed314a;

      /* Primitive — ax-color/yellow */
      --ax-yellow-100: #fffbd9;
      --ax-yellow-600: #fddd00;
      --ax-yellow-dark: #b45309;

      /* ─── Semantic tokens ─── */
      --color-bg:          #ffffff;
      --color-surface:     var(--ax-gray-100);   /* #f4f5f9 */
      --color-surface-2:   var(--ax-gray-200);   /* #e7e9f3 */
      --color-border:      var(--ax-gray-300);   /* #d0d4e6 */
      --color-border-2:    var(--ax-gray-200);

      --color-text:        var(--ax-gray-900);   /* #282833 */
      --color-text-2:      var(--ax-gray-700);   /* #646587 */
      --color-text-3:      var(--ax-gray-500);   /* #9c9ebf */
      --color-text-inv:    #ffffff;

      --color-primary:     var(--ax-blue-700);   /* #434be4  Andes X blue */
      --color-primary-bg:  var(--ax-blue-100);   /* #e9f1ff */
      --color-primary-hov: var(--ax-blue-800);   /* #353ac5 */

      --color-dark:        var(--ax-dark-200);   /* #0d0d1b */
      --color-dark-2:      var(--ax-dark-300);   /* #191a2e */

      --color-success:     var(--mp-green);      /* #00a650 */
      --color-success-bg:  var(--mp-green-bg);   /* #e6f7ee */

      --color-danger:      var(--ax-red-600);    /* #ed314a */
      --color-danger-bg:   var(--ax-red-100);    /* #ffe5e9 */

      --color-warn-bg:     var(--ax-yellow-100); /* #fffbd9 */
      --color-warn-text:   var(--ax-yellow-dark);

      /* ─── Typography — ax-font ─── */
      --font:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-10:     10px;   /* ax-font/size/10  */
      --font-12:     12px;   /* ax-font/size/12  */
      --font-14:     14px;   /* ax-font/size/14  */
      --font-16:     16px;   /* ax-font/size/16  */
      --font-18:     18px;   /* ax-font/size/18  */
      --fw-regular:  400;    /* ax-font/weight/regular  */
      --fw-semibold: 600;    /* ax-font/weight/semibold */
      --fw-bold:     700;    /* ax-font/weight/bold     */

      /* ─── Spacing — ax-dimensions ─── */
      --sp-2:  2px;
      --sp-4:  4px;
      --sp-6:  6px;
      --sp-8:  8px;
      --sp-10: 10px;
      --sp-12: 12px;
      --sp-16: 16px;
      --sp-20: 20px;
      --sp-24: 24px;
      --sp-32: 32px;
      --sp-40: 40px;
      --sp-48: 48px;

      /* ─── Border radius ─── */
      --r-sm:   var(--sp-4);   /* 4px  */
      --r:      var(--sp-8);   /* 8px  */
      --r-lg:   var(--sp-12);  /* 12px */
      --r-full: 9999px;
    }

    body {
      font-family: var(--font);
      font-size: var(--font-14);
      font-weight: var(--fw-regular);
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Topbar ─── */
    .topbar {
      display: flex;
      align-items: center;
      gap: var(--sp-8);
      padding: var(--sp-12) var(--sp-16);
      border-bottom: 1px solid var(--color-border-2);
      flex-shrink: 0;
      background: var(--color-bg);
    }
    .topbar-logo {
      width: 22px; height: 22px;
      border-radius: var(--r-sm);
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--font-12);
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: var(--font-14);
      font-weight: var(--fw-bold);
      flex: 1;
      letter-spacing: -0.1px;
    }
    .topbar-badge {
      font-size: var(--font-10);
      font-weight: var(--fw-semibold);
      color: var(--color-primary);
      background: var(--color-primary-bg);
      padding: 2px var(--sp-8);
      border-radius: var(--r-full);
      letter-spacing: 0.3px;
    }
    .topbar-step {
      font-size: var(--font-10);
      color: var(--color-text-2);
      background: var(--color-surface);
      padding: 2px var(--sp-8);
      border-radius: var(--r-full);
    }
    .link {
      color: var(--color-primary);
      cursor: pointer;
      text-decoration: underline;
      font-weight: var(--fw-semibold);
    }

    /* ─── Progress bar ─── */
    .progress-bar { height: 2px; background: var(--color-border-2); flex-shrink: 0; }
    .progress-fill {
      height: 100%;
      background: var(--color-primary);
      transition: width 0.35s ease;
    }

    /* ─── Scroll area ─── */
    .scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

    /* ─── Step layout ─── */
    .step {
      display: flex;
      flex-direction: column;
      gap: var(--sp-16);
      padding: var(--sp-20) var(--sp-16);
      flex: 1;
    }

    /* ─── Typography ─── */
    .step-label {
      font-size: var(--font-10);
      font-weight: var(--fw-bold);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--color-primary);
    }
    .step-title {
      font-size: 17px;
      font-weight: var(--fw-bold);
      line-height: 1.3;
      letter-spacing: -0.2px;
    }
    .step-sub {
      font-size: var(--font-12);
      color: var(--color-text-2);
      line-height: 1.65;
    }

    /* ─── Form ─── */
    label {
      display: flex;
      flex-direction: column;
      gap: var(--sp-6);
      font-size: var(--font-12);
      font-weight: var(--fw-semibold);
      color: var(--color-text);
    }
    label .hint {
      font-weight: var(--fw-regular);
      color: var(--color-text-2);
      font-size: var(--font-10);
    }
    input[type="text"],
    input[type="password"],
    textarea {
      border: 1.5px solid var(--color-border);
      border-radius: var(--r);
      padding: var(--sp-8) var(--sp-12);
      font-size: var(--font-14);
      font-family: var(--font);
      color: var(--color-text);
      background: var(--color-surface);
      outline: none;
      width: 100%;
      transition: border-color 0.15s, background 0.15s;
      -webkit-font-smoothing: antialiased;
    }
    input:focus, textarea:focus {
      border-color: var(--color-primary);
      background: var(--color-bg);
    }
    input::placeholder, textarea::placeholder { color: var(--color-text-3); }
    textarea { resize: none; min-height: 80px; line-height: 1.5; }

    /* ─── Buttons ─── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-6);
      border: none;
      border-radius: var(--r);
      padding: var(--sp-10) var(--sp-16);
      font-size: var(--font-14);
      font-weight: var(--fw-semibold);
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      letter-spacing: -0.1px;
      -webkit-font-smoothing: antialiased;
    }
    .btn:active:not(:disabled) { transform: scale(0.985); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .btn-primary { background: var(--color-dark); color: var(--color-text-inv); }
    .btn-primary:hover:not(:disabled) { background: var(--color-dark-2); }

    .btn-accent { background: var(--color-primary); color: var(--color-text-inv); }
    .btn-accent:hover:not(:disabled) { background: var(--color-primary-hov); }

    .btn-outline {
      background: var(--color-bg);
      color: var(--color-text);
      border: 1.5px solid var(--color-border);
    }
    .btn-outline:hover:not(:disabled) { background: var(--color-surface); }

    .btn-ghost {
      background: none;
      color: var(--color-text-2);
      border: none;
      font-size: var(--font-12);
      padding: var(--sp-8);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--color-text); }

    .btn-row { display: flex; gap: var(--sp-8); }
    .btn-row .btn { flex: 1; }

    /* ─── Info card ─── */
    .info-card {
      background: var(--color-surface);
      border-radius: var(--r-lg);
      padding: var(--sp-12) var(--sp-16);
      display: flex;
      gap: var(--sp-10);
      align-items: flex-start;
      border: 1px solid var(--color-border-2);
    }
    .info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .info-body { display: flex; flex-direction: column; gap: 3px; }
    .info-title { font-size: var(--font-12); font-weight: var(--fw-semibold); }
    .info-text { font-size: var(--font-12); color: var(--color-text-2); line-height: 1.55; }

    /* ─── Token input ─── */
    .token-wrap { position: relative; }
    .token-wrap input { padding-right: var(--sp-40); font-family: 'SF Mono', monospace; font-size: var(--font-12); }
    .token-toggle {
      position: absolute; right: var(--sp-10); top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: var(--font-14); color: var(--color-text-2);
    }

    /* ─── Analyze loading ─── */
    .analyze-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-16);
      flex: 1;
      padding: var(--sp-40) var(--sp-20);
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .analyze-title { font-size: var(--font-16); font-weight: var(--fw-bold); }
    .analyze-sub { font-size: var(--font-12); color: var(--color-text-2); }
    .analyze-steps { display: flex; flex-direction: column; gap: var(--sp-6); width: 100%; text-align: left; margin-top: var(--sp-8); }
    .analyze-step-row {
      display: flex; align-items: center; gap: var(--sp-10);
      font-size: var(--font-12); color: var(--color-text-2);
      padding: var(--sp-8) var(--sp-12);
      background: var(--color-surface);
      border-radius: var(--r);
      border: 1px solid transparent;
    }
    .analyze-step-row.done { color: var(--mp-green-dark); background: var(--color-success-bg); }
    .analyze-step-row.active { color: var(--color-text); font-weight: var(--fw-semibold); border-color: var(--color-primary); }
    .step-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-border); flex-shrink: 0; }
    .analyze-step-row.done .step-dot { background: var(--color-success); }
    .analyze-step-row.active .step-dot { background: var(--color-primary); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ─── Chat ─── */
    .messages {
      display: flex; flex-direction: column; gap: var(--sp-10);
      padding: var(--sp-16); flex: 1;
    }
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.assistant { align-items: flex-start; }
    .bubble {
      max-width: 90%;
      padding: var(--sp-10) var(--sp-12);
      border-radius: var(--r-lg);
      font-size: var(--font-14);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: var(--color-dark);
      color: var(--color-text-inv);
      border-bottom-right-radius: var(--sp-4);
    }
    .bubble.assistant {
      background: var(--color-surface);
      color: var(--color-text);
      border-bottom-left-radius: var(--sp-4);
    }
    .typing {
      display: flex; gap: var(--sp-4); align-items: center;
      padding: var(--sp-10) var(--sp-12);
      background: var(--color-surface);
      border-radius: var(--r-lg);
      border-bottom-left-radius: var(--sp-4);
      width: fit-content;
    }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--color-text-2);
      animation: bounce 1.1s infinite;
    }
    .typing span:nth-child(2){animation-delay:.18s}
    .typing span:nth-child(3){animation-delay:.36s}
    @keyframes bounce {
      0%,60%,100%{transform:translateY(0);opacity:.4}
      30%{transform:translateY(-4px);opacity:1}
    }

    /* ─── Chat input ─── */
    .chat-input-bar {
      border-top: 1px solid var(--color-border-2);
      padding: var(--sp-10);
      display: flex; gap: var(--sp-8); align-items: flex-end;
      flex-shrink: 0; background: var(--color-bg);
    }
    .chat-textarea {
      flex: 1;
      border: 1.5px solid var(--color-border);
      border-radius: var(--r);
      padding: var(--sp-8) var(--sp-10);
      font-size: var(--font-14);
      font-family: var(--font);
      background: var(--color-surface);
      outline: none; resize: none;
      min-height: 36px; max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.15s;
      color: var(--color-text);
    }
    .chat-textarea:focus { border-color: var(--color-primary); background: var(--color-bg); }
    .chat-textarea::placeholder { color: var(--color-text-3); }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: var(--r);
      background: var(--color-dark);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--color-dark-2); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { fill: #fff; }

    /* ─── Preview ─── */
    .preview-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      padding: var(--sp-12) var(--sp-16);
      border-bottom: 1px solid var(--color-border-2);
    }
    .preview-count {
      font-size: var(--font-10);
      color: var(--color-text-2);
      background: var(--color-surface);
      padding: 2px var(--sp-8);
      border-radius: var(--r-full);
    }
    .slide-list { display: flex; flex-direction: column; gap: var(--sp-6); padding: var(--sp-12) var(--sp-16); }
    .slide-row {
      display: flex; align-items: flex-start; gap: var(--sp-10);
      padding: var(--sp-10) var(--sp-12);
      background: var(--color-surface);
      border-radius: var(--r);
      border: 1px solid var(--color-border-2);
      transition: border-color 0.15s;
    }
    .slide-row:hover { border-color: var(--color-border); }
    .slide-num { font-size: var(--font-10); font-weight: var(--fw-bold); color: var(--color-text-3); min-width: 18px; text-align: right; padding-top: 1px; }
    .slide-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .slide-name { font-size: var(--font-14); font-weight: var(--fw-semibold); }
    .slide-type {
      font-size: var(--font-10); font-weight: var(--fw-semibold);
      color: var(--color-text-2); background: var(--color-surface-2);
      padding: 1px var(--sp-6); border-radius: var(--r-sm); width: fit-content;
    }
    .slide-img-note {
      font-size: var(--font-10);
      color: var(--color-warn-text);
      background: var(--color-warn-bg);
      border-radius: var(--r-sm);
      padding: 1px var(--sp-6); margin-top: 2px; width: fit-content;
    }
    .preview-actions {
      padding: var(--sp-12) var(--sp-16);
      display: flex; flex-direction: column; gap: var(--sp-8);
      border-top: 1px solid var(--color-border-2);
      flex-shrink: 0; background: var(--color-bg);
    }

    /* ─── Done state ─── */
    .done-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: var(--sp-12);
      flex: 1; padding: var(--sp-32) var(--sp-20); text-align: center;
    }
    .done-icon { font-size: 40px; }
    .done-title { font-size: var(--font-18); font-weight: var(--fw-bold); }
    .done-sub { font-size: var(--font-12); color: var(--color-text-2); line-height: 1.65; }

    /* ─── Doc output ─── */
    .doc-output { display: flex; flex-direction: column; flex: 1; }
    .doc-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-10) var(--sp-16);
      border-bottom: 1px solid var(--color-border-2); flex-shrink: 0;
    }
    .doc-toolbar-title { font-size: var(--font-12); font-weight: var(--fw-semibold); }
    .doc-copy-btn {
      font-size: var(--font-10); font-weight: var(--fw-semibold);
      color: var(--mp-green-dark); background: var(--color-success-bg);
      border: none; border-radius: var(--r);
      padding: var(--sp-4) var(--sp-10); cursor: pointer;
    }
    .doc-textarea {
      flex: 1; border: none;
      padding: var(--sp-16); font-size: var(--font-10);
      font-family: 'SF Mono', 'Fira Code', monospace;
      line-height: 1.7; color: var(--color-text); background: var(--color-bg);
      resize: none; outline: none;
    }

    /* ─── Error ─── */
    .error-card {
      background: var(--color-danger-bg);
      border: 1px solid var(--color-danger);
      border-radius: var(--r-lg);
      padding: var(--sp-12) var(--sp-16);
      font-size: var(--font-12);
      color: #7f1d2a;
      line-height: 1.55;
    }

    /* ─── Welcome flow ─── */
    .welcome-flow { display: flex; flex-direction: column; gap: var(--sp-8); }
    .flow-step {
      display: flex; align-items: flex-start; gap: var(--sp-12);
      padding: var(--sp-10) var(--sp-12);
      background: var(--color-surface);
      border-radius: var(--r);
      border: 1px solid var(--color-border-2);
    }
    .flow-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--color-primary); color: #fff;
      font-size: var(--font-10); font-weight: var(--fw-bold);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .flow-text { font-size: var(--font-12); line-height: 1.55; }
    .flow-text strong { display: block; font-size: var(--font-12); font-weight: var(--fw-semibold); margin-bottom: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- INJECT_SCRIPT -->
</body>
</html>
